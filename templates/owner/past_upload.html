<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📸 Past Order — Uttam Tailors</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
       background:#0f172a; color:#fff; height:100dvh; display:flex;
       flex-direction:column; overflow:hidden; }

.topbar { padding:12px 16px; background:#1e293b; border-bottom:1px solid #334155;
          display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.topbar h1 { font-size:17px; font-weight:800; }
.badge { background:#6366f1; color:#fff; padding:4px 12px;
         border-radius:20px; font-size:13px; font-weight:800; }

/* Screen: Code input */
#screen-code { flex:1; display:flex; flex-direction:column;
               align-items:center; justify-content:center; padding:24px; gap:16px; }
#screen-code label { font-size:12px; font-weight:700; text-transform:uppercase;
                     letter-spacing:1px; color:#64748b; }
#code-inp { width:100%; max-width:320px; padding:18px; font-size:36px; font-weight:900;
            background:#1e293b; border:2px solid #334155; border-radius:14px;
            color:#fff; text-align:center; letter-spacing:5px; outline:none; }
#code-inp:focus { border-color:#6366f1; }

/* Screen: Camera full screen */
#screen-cam { flex:1; display:none; flex-direction:column; position:relative; background:#000; }
#cam-video { width:100%; height:100%; object-fit:cover; display:block; }
.shutter-wrap { position:absolute; bottom:0; left:0; right:0; padding:20px;
                display:flex; flex-direction:column; align-items:center; gap:10px;
                background:linear-gradient(transparent,rgba(0,0,0,0.7)); }
.cam-code-lbl { font-size:13px; font-weight:800; background:rgba(0,0,0,0.5);
                padding:4px 14px; border-radius:20px; }
.shutter { width:72px; height:72px; border-radius:50%; border:4px solid #fff;
           background:rgba(255,255,255,0.2); cursor:pointer; }
.shutter:active { background:rgba(255,255,255,0.7); }

/* Screen: Details form */
#screen-form { flex:1; display:none; flex-direction:column; overflow-y:auto; padding:20px; gap:14px; }
.preview-thumb { width:100%; max-height:200px; object-fit:cover; border-radius:14px; border:2px solid #334155; }
.form-title { font-size:18px; font-weight:800; color:#fff; }
.form-sub { font-size:13px; color:#64748b; }
.field { display:flex; flex-direction:column; gap:6px; }
.field label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#64748b; }
.field input { padding:14px; font-size:16px; font-weight:700;
               background:#1e293b; border:2px solid #334155; border-radius:12px;
               color:#fff; outline:none; }
.field input:focus { border-color:#6366f1; }
.field input::placeholder { color:#475569; font-weight:400; }
.btn-save { padding:16px; background:linear-gradient(135deg,#059669,#047857);
            color:#fff; border:none; border-radius:14px; font-size:16px;
            font-weight:800; cursor:pointer; width:100%; }
.btn-save:disabled { opacity:0.5; }
.btn-retake-sm { padding:10px; background:rgba(255,255,255,0.08); color:#94a3b8;
                 border:1.5px solid #334155; border-radius:10px; font-size:13px;
                 font-weight:700; cursor:pointer; width:100%; text-align:center; }

/* Screen: Saved */
#screen-saved { flex:1; display:none; flex-direction:column;
                align-items:center; justify-content:center; padding:24px; gap:16px; }
.saved-icon { font-size:64px; }
.saved-title { font-size:24px; font-weight:900; text-align:center; }
.saved-sub { font-size:14px; color:#94a3b8; text-align:center; }
.btn-next { width:100%; max-width:320px; padding:16px;
            background:linear-gradient(135deg,#f59e0b,#d97706);
            color:#fff; border:none; border-radius:14px;
            font-size:17px; font-weight:800; cursor:pointer; }

.btn-primary { width:100%; max-width:320px; padding:16px;
               background:linear-gradient(135deg,#6366f1,#4f46e5);
               color:#fff; border:none; border-radius:14px;
               font-size:16px; font-weight:800; cursor:pointer; }
.btn-primary:disabled { opacity:0.4; }
.hint { font-size:13px; color:#64748b; text-align:center; }
.status { font-size:13px; color:#94a3b8; text-align:center; min-height:18px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>📸 Past Order</h1>
  <div class="badge" id="top-badge" style="display:none;">#<span id="top-code"></span></div>
</div>

<!-- Screen 1: Code -->
<div id="screen-code">
  <label>Order Code Daalo</label>
  <input type="text" id="code-inp" inputmode="numeric" placeholder="2001"
         autocomplete="off" autofocus oninput="onCodeChange()"
         onkeydown="if(event.key==='Enter'&&this.value.trim()) startCamera()">
  <div class="hint">Diary se order number daalo</div>
  <button class="btn-primary" id="open-cam-btn" disabled onclick="startCamera()">
    📷 Camera Kholo
  </button>
  <div class="status" id="s1"></div>
</div>

<!-- Screen 2: Camera -->
<div id="screen-cam">
  <video id="cam-video" autoplay playsinline muted></video>
  <div class="shutter-wrap">
    <div class="cam-code-lbl">Order #<span id="cam-code-lbl"></span></div>
    <button class="shutter" onclick="capturePhoto()"></button>
    <div style="font-size:12px;color:rgba(255,255,255,0.6);">Diary page ko frame karo → Tap</div>
  </div>
</div>

<!-- Screen 3: Details Form -->
<div id="screen-form">
  <img id="prev-thumb" class="preview-thumb" alt="">
  <div class="form-title">✅ Photo li! — Customer ki details daalo</div>
  <div class="form-sub">Sirf naam aur mobile enough hai — baaki baad mein edit se add karo</div>

  <div class="field">
    <label>Customer Name *</label>
    <input type="text" id="f-name" placeholder="Ramesh Ji" autocomplete="off">
  </div>
  <div class="field">
    <label>Mobile Number</label>
    <input type="tel" id="f-mobile" placeholder="9876543210" inputmode="numeric" maxlength="10">
  </div>
  <div class="field">
    <label>Address / Gaon</label>
    <input type="text" id="f-address" placeholder="Sikar / Laxmangarh...">
  </div>

  <button class="btn-save" id="save-btn" onclick="saveOrder()">
    💾 Save Order + Image
  </button>
  <button class="btn-retake-sm" onclick="retake()">↩ Retake Photo</button>
  <div class="status" id="s3"></div>
</div>

<!-- Screen 4: Saved -->
<div id="screen-saved">
  <div class="saved-icon">✅</div>
  <div class="saved-title" id="saved-title">Order Saved!</div>
  <div class="saved-sub" id="saved-sub"></div>
  <button class="btn-next" onclick="nextOrder()">➕ Next Order</button>
</div>

<script>
let mediaStream = null;
let capturedBlob = null;
let currentCode  = "";

function onCodeChange() {
  const v = document.getElementById("code-inp").value.trim();
  document.getElementById("open-cam-btn").disabled = !v;
}

async function startCamera() {
  currentCode = document.getElementById("code-inp").value.trim();
  if (!currentCode) return;

  document.getElementById("top-badge").style.display = "flex";
  document.getElementById("top-code").textContent = currentCode;
  document.getElementById("cam-code-lbl").textContent = currentCode;
  showScreen("cam");

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:{ideal:"environment"}, width:{ideal:1920}, height:{ideal:1440} },
      audio: false
    });
    document.getElementById("cam-video").srcObject = mediaStream;
  } catch(e) {
    // Fallback: file input
    showScreen("code");
    const inp = document.createElement("input");
    inp.type="file"; inp.accept="image/*"; inp.capture="environment";
    inp.onchange = function() { if(inp.files[0]) prepareForm(inp.files[0]); };
    inp.click();
  }
}

function capturePhoto() {
  const video = document.getElementById("cam-video");
  const canvas = document.createElement("canvas");
  canvas.width  = video.videoWidth  || 1280;
  canvas.height = video.videoHeight || 960;
  canvas.getContext("2d").drawImage(video, 0, 0);
  canvas.toBlob(function(blob) {
    stopCamera();
    prepareForm(blob);
  }, "image/jpeg", 0.88);
}

function prepareForm(blob) {
  capturedBlob = blob;
  document.getElementById("prev-thumb").src = URL.createObjectURL(blob);
  showScreen("form");
  document.getElementById("f-name").focus();
}

function retake() { capturedBlob=null; startCamera(); }

function stopCamera() {
  if (mediaStream) { mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
}

async function saveOrder() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { document.getElementById("s3").textContent="⚠️ Customer naam required"; return; }

  const btn = document.getElementById("save-btn");
  btn.disabled=true; btn.textContent="Saving...";
  document.getElementById("s3").textContent="Order save ho raha hai...";

  // Step 1: Save order to DB
  const orderRes = await fetch("/owner/past-orders/save", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      order_code:    currentCode,
      customer_name: name,
      mobile:        document.getElementById("f-mobile").value.trim(),
      address:       document.getElementById("f-address").value.trim(),
      order_date:    "",
      delivery_date: "",
      total_amount:  0,
      advance_paid:  0,
      payment_mode:  "cash",
      is_delivered:  true,
      garments:      []
    })
  });
  const orderData = await orderRes.json().catch(()=>({}));

  if (!orderData.ok) {
    btn.disabled=false; btn.textContent="💾 Save Order + Image";
    document.getElementById("s3").textContent = "❌ " + (orderData.error||"Save failed");
    return;
  }

  const savedCode = orderData.order_code || currentCode;
  document.getElementById("s3").textContent = "✅ Order saved! Image upload ho rahi hai...";

  // Step 2: Upload image
  if (capturedBlob) {
    const fd = new FormData();
    fd.append("photos", capturedBlob, "diary_" + savedCode + ".jpg");
    await fetch("/upload/" + savedCode, { method:"POST", body:fd }).catch(()=>{});
  }

  // Show success
  document.getElementById("saved-title").textContent = "Order #" + savedCode + " Saved! ✅";
  document.getElementById("saved-sub").textContent =
    name + " — har jagah search ho sakta hai ab\n(Order Status, Measurement Book, sab jagah)";
  showScreen("saved");
}

function nextOrder() {
  capturedBlob=null; currentCode="";
  document.getElementById("code-inp").value="";
  document.getElementById("f-name").value="";
  document.getElementById("f-mobile").value="";
  document.getElementById("f-address").value="";
  document.getElementById("top-badge").style.display="none";
  document.getElementById("open-cam-btn").disabled=true;
  document.getElementById("s1").textContent="";
  document.getElementById("s3").textContent="";
  const btn = document.getElementById("save-btn");
  btn.disabled=false; btn.textContent="💾 Save Order + Image";
  showScreen("code");
  setTimeout(()=>document.getElementById("code-inp").focus(), 100);
}

function showScreen(name) {
  stopCamera();
  ["code","cam","form","saved"].forEach(s=>{
    document.getElementById("screen-"+s).style.display="none";
  });
  document.getElementById("screen-"+name).style.display="flex";
}
</script>
</body>
</html>
