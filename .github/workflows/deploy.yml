name: Deploy to Oracle Cloud

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Deploy via SSH
        continue-on-error: true
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e
            cd /home/ubuntu/UTMS
            git pull origin main
            sudo systemctl restart utms
            # Remove Nginx Basic Auth if still present
            if grep -q 'auth_basic' /etc/nginx/sites-available/uttamtailors 2>/dev/null; then
              sudo sed -i '/auth_basic/d' /etc/nginx/sites-available/uttamtailors
              sudo nginx -t && sudo systemctl reload nginx
              echo Nginx auth removed!
            fi
            echo Deploy done!
          "
